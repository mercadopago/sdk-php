name: CI master V3

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - name: Install dependencies
        run: composer install

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite "Unit Tests"

      - name: Dependency audit
        run: composer audit
